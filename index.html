<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flashcards</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#4338ca" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Flashcards" />
  <link rel="apple-touch-icon" href="icon.svg" />
</head>
<body data-page="entry">
  <div class="app-shell">
    <header class="app-bar">
      <span class="app-bar-brand">Flashcards</span>
      <div class="app-bar-right">
        <nav class="app-bar-nav" aria-label="App navigation">
          <a href="index.html" class="app-bar-link">✏️ Add cards</a>
          <a href="review.html" class="app-bar-link">📖 Review</a>
        </nav>
        <div id="authSection" class="auth-section">
          <button type="button" id="loginBtn" class="auth-login-btn hidden">Sign in with Facebook</button>
          <div id="userInfo" class="auth-user hidden">
            <span id="userName" class="auth-name"></span>
            <button type="button" id="logoutBtn" class="auth-signout-btn">Sign out</button>
          </div>
        </div>
      </div>
    </header>

    <div id="loginScreen" class="login-screen">
      <div class="login-card">
        <div class="login-card-logo">Flashcards</div>
        <p class="login-card-tagline">Sign in to save and sync your decks across devices.</p>
        <button type="button" id="loginScreenBtn" class="auth-login-btn">Sign in with Facebook</button>
      </div>
    </div>

    <main class="hidden">
      <section class="panel" id="cardFormPanel">
        <h2>Add a flashcard</h2>
        <div class="deck-row">
          <label class="deck-label">
            Deck
            <div class="deck-controls">
              <select id="deckSelect"></select>
              <button type="button" id="addDeckBtn" class="secondary">+ Add deck</button>
              <button type="button" id="renameDeckBtn" class="secondary">Rename</button>
              <button type="button" id="deleteDeckBtn" class="danger">Delete</button>
            </div>
            <div id="newDeckRow" class="new-deck-row hidden">
              <input type="text" id="newDeckName" class="new-deck-name-input" placeholder="Deck name" autocomplete="off" maxlength="60" />
              <button type="button" id="confirmNewDeckBtn" class="primary">Add</button>
              <button type="button" id="cancelNewDeckBtn" class="secondary">Cancel</button>
            </div>
          </label>
        </div>
        <form id="cardForm">
          <label>
            Term
            <input type="text" id="termInput" placeholder="Enter the term" autocomplete="off" required />
          </label>
          <label>
            Definition
            <textarea id="definitionInput" placeholder="Enter the definition" rows="4" required></textarea>
          </label>
          <div class="actions-row">
            <button type="submit" class="primary">Save card</button>
            <button type="button" id="clearFormBtn" class="secondary">Clear</button>
          </div>
        </form>
      </section>

      <section class="panel" id="cardLibraryPanel">
        <div class="panel-header">
          <div>
            <h2>Card library</h2>
            <p id="cardCount">0 cards saved</p>
          </div>
          <div class="panel-actions">
            <button id="exportBtn" class="secondary">Export deck</button>
            <button id="importBtn" class="secondary">Import JSON</button>
            <button id="clearAllBtn" class="danger">Clear deck</button>
          </div>
        </div>
        <div id="cardList" class="card-list" aria-live="polite"></div>
        <input type="file" id="importFileInput" accept="application/json" hidden />
      </section>

    </main>

    <footer class="footer">
      <p>Syncs to Back4App when online. Export JSON to share decks. · <a href="privacy.html">Privacy &amp; Data Retention</a></p>
    </footer>
  </div>
  <script src="https://unpkg.com/parse/dist/parse.min.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
    }
  </script>
</body>
</html>
